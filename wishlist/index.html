<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Manager</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <img src="images/wishlist-generator2_resized.png" alt="A logo with the text Wishlist Generator and an icon of a list" id="logo">
        <h1>Wishlist Manager</h1>
        <img src="images/pile-of-gifts_resized_resized.jpg" alt="A pile of gifts under a christmas tree">
    </header>
    <section id="intro">
        <p>Welcome to the Wishlist Creator — the best place to store items you want from a variety of sites! Just input the item name, price, and the link to buy it and it'll remember everything for you.</p>
    </section>
    <form id="item-form">
        <div>
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" name="item-name" required>
        </div>
        <div>
            <label for="item-price">Item Price</label>
            <input type="number" min="0" id="item-price" name="item-price" required>
        </div>
        <div>
            <label for="item-url">Item URL</label>
            <input type="url" id="item-url" name="item-url" required>
        </div>
        <input type="submit" value="Submit">
    </form>
    <ul id="wishlist">
        
    </ul>
    <p id="emptyMessage">No items in the wishlist</p>
</body>
</html>
